name: Build and Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Docker build and push to ECR
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/sutrava/backend:${{ github.sha }} .
          docker tag $ECR_REGISTRY/sutrava/backend:${{ github.sha }} \
            $ECR_REGISTRY/sutrava/backend:latest
          docker push $ECR_REGISTRY/sutrava/backend:${{ github.sha }}
          docker push $ECR_REGISTRY/sutrava/backend:latest

      # Step 5: EC2 pulls from ECR and runs with secrets
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS \
              --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # Pull latest image from ECR
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/sutrava/backend:latest

            # Stop and remove old container
            docker stop sutrava-backend || true
            docker rm sutrava-backend || true

            # Run with secrets injected
            docker run -d \
              --name sutrava-backend \
              --restart always \
              -p 443:8443 \
              -v /home/ec2-user/app/certs/keystore.p12:/app/certs/keystore.p12:ro \
              -e SSL_KEY_STORE=file:/app/certs/keystore.p12 \
              -e SSL_KEY_STORE_PASSWORD=${{ secrets.SSL_KEY_STORE_PASSWORD }} \
              -e ATLASSIAN_CLIENT_ID=${{ secrets.ATLASSIAN_CLIENT_ID }} \
              -e ATLASSIAN_CLIENT_SECRET=${{ secrets.ATLASSIAN_CLIENT_SECRET }} \
              -e MONGODB_URI=${{ secrets.MONGODB_URI }} \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/sutrava/backend:latest

            # Cleanup old images
            docker image prune -f
